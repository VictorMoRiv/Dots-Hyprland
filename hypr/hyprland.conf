source = ~/.config/hypr/current-theme.conf
source = ~/.config/hypr/monitor.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/animation.conf
source = ~/.config/hypr/windowrules.conf


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
#################
### AUTOSTART ###
#################

exec-once = awww-daemon
exec-once = waybar
exec-once = swaync
exec-once = swayosd-server
exec-once = hypridle
exec-once = spotify
exec-once = steam
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = ~/.config/hypr/scripts/horario-themas.sh start
exec-once = sleep 2 && /home/victor/.local/bin/kbs start -p nk-cream -m g502x-wireless -v 100
############################
### ENVIRONMENT VARIABLES ###
############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR, Imágenes/Capturas

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 10  # top, right, bottom, left (uniform)
    border_size = 0
    
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false
    
    # Si está en true, el mouse no se ve
    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    # NOTA: rounding_power ya no existe en Hyprland 0.53+
    # El rounding ahora usa un algoritmo fijo y mejorado
    
    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 15
        render_power = 0
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 9
        passes = 2
        vibrancy = 0.1696
    }
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = border_size 0, match:float 0, match:workspace w[tv1]
# windowrule = rounding 0, match:float 0, match:workspace w[tv1]
# windowrule = border_size 0, match:float 0, match:workspace f[1]
# windowrule = rounding 0, match:float 0, match:workspace f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
# NOTA: La sintaxis de gestures cambió en 0.53
gestures {
    # Básico: swipe horizontal con 3 dedos
    gesture = 3, horizontal, workspace
    
    # Con opciones adicionales (si las necesitas):
    workspace_swipe_invert = false     # Invertir dirección
    workspace_swipe_distance = 700     # Distancia mínima
    workspace_swipe_forever = true     # Permitir crear workspaces infinitos
    
    # Otros gestos personalizados:
    gesture = 3, up, fullscreen                 # 3 dedos arriba = pantalla completa
    gesture = 4, horizontal, workspace          # 4 dedos para cambiar workspace
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
# NUEVA SINTAXIS PARA HYPRLAND 0.53+
windowrule = no_focus on, match:class ^$ match:title ^$ match:xwayland 1 match:float 1 match:fullscreen 0 match:pinned 0

# Workspace assignments
windowrule = workspace 10 silent, match:class ^*[Ss]potify.*
windowrule = workspace 9 silent, match:class ^(steam)$

exec-once = bluetoothctl agent on
exec-once = blueman-applet
exec-once = quickshell

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1