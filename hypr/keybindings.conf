
###################
### KEYBINDINGS ###
###################
#define XKB_KEY_BackSpace                     0xff08  /* U+0008 BACKSPACE */

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$terminal = kitty
$fileManager = nemo 
$browser = firefox
$powermenu = ~/.config/rofi/scripts/powermenu_t2
$editorcode = codium

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme-switcher.sh --rofi
bind = $mainMod, Q, killactive,
bind = $mainMod, J, exec, $gamelauncher
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, A, exec, $menu || pkill rofi
bind = $mainMod, K, pseudo, # dwindle
bind = $mainMod, G, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod ALT, M, exec, ~/.config/waybar/scripts/launch.sh
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/reiniciar_swaync.sh
bind = CTRL_ALT, Delete, exec, wlogout
bind = ,PRINT, exec, hyprshot -m region
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/horario-themas.sh now
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output
bind = $mainMod, P, exec, hyprpicker
bind = $mainMod, V, exec, pkill rofi || ~/.config/hypr/scripts/clipmanager.sh
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/theme-switcher.sh --toggle-music
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock.conf
bind = $mainMod SHIFT, C, exec, $editorcode
bind = $mainMod, C, exec, qs ipc call calculator toggle
bind = $mainMod, slash, exec, pkill rofi || ~/.config/hypr/scripts/notas-rofi.sh
bind = $mainMod, X, exec, qs ipc call translator toggle
bind = $mainMod ALT, T, exec, [match:float] kitty 
bind = $mainMod, N, exec, swaync-client -t -sw
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max-volume 150
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower --max-volume 150
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle --max-volume 150
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Control de Brillo
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Caps Lock (opcional - si no usas el backend automático)
bindl = ,Caps_Lock, exec, swayosd-client --caps-lock

# Control de Reproducción (opcional)
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl previous
bindd = $mainMod Alt, 1, $d move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $mainMod Alt, 2, $d move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $mainMod Alt, 3, $d move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $mainMod Alt, 4, $d move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $mainMod Alt, 5, $d move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $mainMod Alt, 6, $d move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $mainMod Alt, 7, $d move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $mainMod Alt, 8, $d move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $mainMod Alt, 9, $d move to workspace 9  (silent), movetoworkspacesilent, 9
bindd = $mainMod Alt, 0, $d move to workspace 10 (silent), movetoworkspacesilent, 10


