# Configuración del tema: Everforest

# GTK
GTK_THEME="Everforest-Red-Light"
ICON_THEME="Colloid-Green-Everforest-Light"
GTK_COLOR_SCHEME="prefer-light"  # Usamos el valor exacto que entiende gsettings
CURSOR_THEME="capitaine-cursors-light"

# Kitty
KITTY_THEME="Everforest"

# Rofi
ROFI_THEME="Everforest"

# Waybar
WAYBAR_THEME="Everforest"

# SwayNC
SWAYNC_THEME="Everforest"

# VSCodium (nombre exacto del tema instalado)
VSCODIUM_THEME="Everforest Dark"

# Spicetify (Spotify)
SPICETIFY_THEME="text"
SPICETIFY_SCHEME="EverforestDarkHard"

# Pywal - Generar colores desde wallpaper
USE_PYWAL="false"  # true o false

# Música del tema
THEME_MUSIC_ENABLED="true"       # true para activar música
THEME_MUSIC_FILE="theme.mp3"      # Nombre del archivo de audio
THEME_MUSIC_VOLUME="0.3"          # Volumen (0.0 a 1.0)

# SWWW (Wallpaper transitions)
SWWW_TRANSITION="center"
SWWW_DURATION="2"
SWWW_FPS="60"
SWWW_BEZIER=".43,1.19,1,.4"
