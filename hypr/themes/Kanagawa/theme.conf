# Configuración del tema: Kanagawa

# GTK
GTK_THEME="Kanagawa-Yellow-Dark"
ICON_THEME="Papirus-Dark"
CURSOR_THEME="capitaine-cursors"

# Kitty
KITTY_THEME="Kanagawa"

# Rofi
ROFI_THEME="Kanagawa"

# Waybar
WAYBAR_THEME="Kanagawa"

# SwayNC
SWAYNC_THEME="Kanagawa"

# VSCodium (nombre exacto del tema instalado)
VSCODIUM_THEME="KanagawaTheme"

# Spicetify (Spotify)
SPICETIFY_THEME="Sleek"
SPICETIFY_SCHEME="Coral"

# Pywal - Generar colores desde wallpaper
USE_PYWAL="false"  # true o false

# Música del tema
THEME_MUSIC_ENABLED="true"       # true para activar música
THEME_MUSIC_FILE="theme.mp3"      # Nombre del archivo de audio
THEME_MUSIC_VOLUME="0.3"          # Volumen (0.0 a 1.0)

# SWWW (Wallpaper transitions)
SWWW_TRANSITION="center"
SWWW_DURATION="2"
SWWW_FPS="60"
SWWW_BEZIER=".43,1.19,1,.4"
