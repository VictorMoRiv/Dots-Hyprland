# ============================================================================
# Hyprlock Configuration with Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Background
# ----------------------------------------------------------------------------
background {
    monitor =
    path = $HOME/Imágenes/Wallpapers/calm.png
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor = 
    size = 30%, 100%
    color = rgba(22, 22, 29, 0.95)
    rounding = 0
    border_size = 1
    border_color = rgb(1F1F28)
    rotate = 0
    xray = false
    position = 0, 0
    halign = left
    valign = center
    zindex = 0
}
# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
general {
    ignore_empty_input = true
    hide_cursor = false
}

# ----------------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------------
animations {
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

# ----------------------------------------------------------------------------
# Password Input Field
# ----------------------------------------------------------------------------
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2      # Scale of input-field height (0.2 - 0.8)
    dots_spacing = 0.2   # Scale of dots' absolute size (0.0 - 1.0)
    dots_center = true
    outer_color = rgb(C8C093)
    inner_color = rgb(16161D)
    font_color = rgb(C8C093)
    fade_on_empty = false
    font_family = Victor Mono
    placeholder_text = <span foreground="##C8C093">Ingresar Contraseña</span>
    hide_input = false
    position = 150, -170
    halign = left
    valign = center
    zindex = 1
}

# ----------------------------------------------------------------------------
# Clock & Date Display
# ----------------------------------------------------------------------------

# Time (large display)
label {
    monitor =
    text = $TIME
    color = rgb(C8C093)
    font_size = 140
    font_family = Victor Mono
    position = 10, 260
    halign = left
    valign = center
    zindex = 1
}

# Date (day and month)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgb(DCD7BA)
    font_size = 20
    font_family = Victor Mono
    position = 130, 380
    halign = left
    valign = center
    zindex = 1
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = rgb(C8C093)
    font_size = 28
    font_family = SF Pro Display Bold
    position = 265, -50
    halign = left
    valign = top
    zindex = 1
}

# ----------------------------------------------------------------------------
# User Profile
# ----------------------------------------------------------------------------

# Profile photo
image {
    monitor =
    path = $HOME/Imágenes/tamaulipas.jpg
    border_color = rgb(1F1F28)
    border_size = 4
    size = 150
    rounding = 10      # -1 = circle
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 200, 30
    halign = left
    valign = center
    zindex = 1
}

# Username greeting
label {
    monitor =
    text = Buenas Noches $USER
    color = rgb(DCD7BA)
    font_size = 22
    font_family = Victor Mono
    position = 105, -105
    halign = left
    valign = center
    zindex = 1
}

# ============================================================================
# Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Album Art
# ----------------------------------------------------------------------------
image {
    monitor =
    path = $HOME/.config/hypr/scripts/music.webp
    size = 100
    rounding = 5
    border_size = 5
    border_color = rgb(1F1F28)
    rotate = 0
    reload_time = 1
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art
    position = 60, 117
    halign = left
    valign = bottom
    zindex = 2
}

# ----------------------------------------------------------------------------
# Player Background Box
# ----------------------------------------------------------------------------
shape {
    monitor =
    color = rgb(16161D)
    size = 500, 140
    rounding = 10
    position = 40, 100
    halign = left
    valign = bottom
    zindex = 1
}

# ----------------------------------------------------------------------------
# Track Information
# ----------------------------------------------------------------------------

# Song title
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = rgb(C8C093)
    font_size = 16
    font_family = Victor Mono Bold
    position = 185, 198
    halign = left
    valign = bottom
    zindex = 2
}

# Player source (e.g., Spotify, Firefox)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --player)"   
    color = rgb(98BB6C)
    font_size = 18
    font_family = Victor Mono
    position = 495, 110
    halign = left
    valign = bottom
    zindex = 2
}

# Artist name
label {
    monitor =
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = rgb(C8C093)
    font_size = 12
    font_family = SF Pro Display Semibold
    position = 185, 178
    halign = left
    valign = bottom
    zindex = 2
}

# ----------------------------------------------------------------------------
# Playback Controls
# ----------------------------------------------------------------------------

# Previous track button
label {
    monitor =
    text = 󰒮
    color = rgb(DCD7BA)
    font_size = 25
    onclick = playerctl previous
    position = 285, 115
    halign = left
    valign = bottom
    zindex = 2
}

# Play/Pause button
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --status
    color = rgb(DCD7BA)
    font_size = 25
    onclick = playerctl play-pause
    position = 325, 115
    halign = left
    valign = bottom
    zindex = 2
}

# Next track button
label {
    monitor =
    text = 󰒭
    color = rgb(DCD7BA)
    font_size = 25
    onclick = playerctl next
    position = 365, 115
    halign = left
    valign = bottom
    zindex = 2
}

# ----------------------------------------------------------------------------
# Progress Display
# ----------------------------------------------------------------------------

# Current position timestamp
label {
    monitor = 
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = rgb(DCD7BA)
    font_size = 10
    font_family = SF Pro Display Medium
    position = 200, 152
    halign = left
    valign = bottom
    zindex = 2
}

# Total length timestamp
label {
    monitor = 
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = rgb(DCD7BA)
    font_size = 10
    font_family = SF Pro Display Medium
    position = 475, 152
    halign = left
    valign = bottom
    zindex = 2
}

# Progress bar (with Pango markup for colored segments)
label {
    monitor = 
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --progress-bar
    color = rgb(f5e0dc)
    font_size = 15
    font_family = SF Pro Display Medium
    position = 245, 150
    halign = left
    valign = bottom
    zindex = 2
}


