# Configuración del tema: Gruvbox

# GTK
GTK_THEME="Gruvbox-Red-Dark"
ICON_THEME="Gruvbox-Plus-Dark"
CURSOR_THEME="pacman"

# Kitty
KITTY_THEME="Gruvbox"

# Rofi
ROFI_THEME="Gruvbox"

# Waybar
WAYBAR_THEME="Gruvbox"

# SwayNC
SWAYNC_THEME="Gruvbox"

# VSCodium (nombre exacto del tema instalado)
VSCODIUM_THEME="Gruvbox Dark Hard"

# Spicetify (Spotify)
SPICETIFY_THEME="Sleek"
